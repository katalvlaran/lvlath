# codecov.yml
coverage:
  status:
    project:
      default:
        # Compare total coverage against the base commit.
        target: auto

        # Permit a small fluctuation caused by rounding or line movement.
        threshold: 0.5

        # Initial rollout: report, but do not block merging yet.
        informational: true

    patch:
      default:
        # New and modified executable lines should be well tested.
        target: 90

        threshold: 1
        informational: true

comment:
  # Compact, review-oriented PR comment.
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default

  # Avoid a comment on every completely uneventful PR.
  require_changes: "coverage_drop OR uncovered_patch"

  require_base: true
  require_head: true
  hide_project_coverage: false

ignore:
  - "examples"